services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-tasks-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=${APP_ENV:-local}
    networks:
      - api-tasks-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: api-tasks-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - api-tasks-network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: api-tasks-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-api_tasks}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - api-tasks-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  api-tasks-network:
    driver: bridge

volumes:
  pgdata:
